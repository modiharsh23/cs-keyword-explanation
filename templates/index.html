<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CS Topic Explorer</title>
  <meta name="description"
    content="Search any computer science topic and get a structured explanation with resources" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg-primary: #0b0b10;
      --bg-surface: #14141e;
      --bg-card: #1a1a28;
      --bg-hover: #1e1e30;
      --border-subtle: rgba(255, 255, 255, 0.07);
      --text-primary: #e8e8ed;
      --text-muted: #7a7a94;
      --accent: #6c5ce7;
      --accent-light: #a78bfa;
      --accent-glow: rgba(108, 92, 231, 0.30);
      --gradient: linear-gradient(135deg, #6c5ce7, #a855f7);
      --danger: #ff6b6b;
      --radius: 16px;
      --transition: 0.3s cubic-bezier(.4, 0, .2, 1);
    }

    html,
    body {
      height: 100%;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
    }

    .app {
      height: 100dvh;
      display: flex;
    }

    /* ══════════════════════════════════════════════════════
       LEFT SIDEBAR — Search History
       ══════════════════════════════════════════════════════ */
    .history-sidebar {
      position: fixed;
      left: -280px;
      top: 0;
      bottom: 0;
      width: 280px;
      z-index: 200;
      display: flex;
      flex-direction: column;
      background: var(--bg-surface);
      border-right: 1px solid var(--border-subtle);
      overflow: hidden;
      transition: left var(--transition);
      box-shadow: 4px 0 24px rgba(0, 0, 0, 0.5);
    }

    .history-sidebar.open {
      left: 0;
    }

    .sidebar-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 199;
    }

    .sidebar-backdrop.show {
      display: block;
    }

    .history-header {
      padding: 20px 18px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border-subtle);
    }

    .history-header h2 {
      font-size: 0.82rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--text-muted);
    }

    .clear-all-btn {
      font-size: 0.72rem;
      color: var(--text-muted);
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 6px;
      transition: color var(--transition), background var(--transition);
      font-family: inherit;
    }

    .clear-all-btn:hover {
      color: var(--danger);
      background: rgba(255, 107, 107, 0.08);
    }

    .history-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }

    .history-list::-webkit-scrollbar {
      width: 4px;
    }

    .history-list::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.06);
      border-radius: 2px;
    }

    .history-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 14px;
      margin-bottom: 4px;
      border-radius: 10px;
      cursor: pointer;
      transition: background var(--transition);
      position: relative;
    }

    .history-item:hover {
      background: var(--bg-hover);
    }

    .history-item.active {
      background: rgba(108, 92, 231, 0.12);
      border: 1px solid rgba(108, 92, 231, 0.2);
    }

    .history-item-icon {
      width: 28px;
      height: 28px;
      border-radius: 7px;
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      display: grid;
      place-items: center;
      font-size: 12px;
      flex-shrink: 0;
    }

    .history-item-text {
      flex: 1;
      min-width: 0;
    }

    .history-item-text .topic-name {
      font-size: 0.88rem;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .history-item-text .topic-time {
      font-size: 0.7rem;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .history-delete {
      opacity: 0;
      width: 24px;
      height: 24px;
      border: none;
      background: none;
      color: var(--text-muted);
      cursor: pointer;
      border-radius: 6px;
      display: grid;
      place-items: center;
      font-size: 14px;
      transition: opacity var(--transition), color var(--transition), background var(--transition);
      flex-shrink: 0;
    }

    .history-item:hover .history-delete {
      opacity: 1;
    }

    .history-delete:hover {
      color: var(--danger);
      background: rgba(255, 107, 107, 0.1);
    }

    .history-empty {
      padding: 32px 16px;
      text-align: center;
      color: var(--text-muted);
      font-size: 0.82rem;
      line-height: 1.5;
    }

    /* ══════════════════════════════════════════════════════
       MAIN AREA
       ══════════════════════════════════════════════════════ */
    .main-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      overflow: hidden;
    }

    /* ── Search view (centered) ──────────────────────────── */
    #search-view {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      animation: fadeIn 0.5s ease;
    }

    .brand-icon {
      width: 72px;
      height: 72px;
      border-radius: 20px;
      background: var(--gradient);
      display: grid;
      place-items: center;
      font-size: 34px;
      margin-bottom: 28px;
      box-shadow: 0 0 40px var(--accent-glow), 0 8px 32px rgba(0, 0, 0, 0.4);
    }

    #search-view h1 {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      margin-bottom: 10px;
      background: var(--gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    #search-view>p {
      color: var(--text-muted);
      font-size: 1rem;
      margin-bottom: 36px;
      max-width: 440px;
      text-align: center;
      line-height: 1.6;
    }

    .search-box {
      display: flex;
      gap: 10px;
      width: 100%;
      max-width: 560px;
      background: var(--bg-surface);
      border: 1px solid var(--border-subtle);
      border-radius: 16px;
      padding: 6px 6px 6px 20px;
      transition: border-color var(--transition), box-shadow var(--transition);
    }

    .search-box:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px var(--accent-glow);
    }

    #topic-input {
      flex: 1;
      border: none;
      outline: none;
      background: transparent;
      color: var(--text-primary);
      font-family: inherit;
      font-size: 1rem;
      padding: 14px 0;
    }

    #topic-input::placeholder {
      color: var(--text-muted);
    }

    #search-btn {
      padding: 0 28px;
      border: none;
      border-radius: 12px;
      background: var(--gradient);
      color: #fff;
      font-family: inherit;
      font-size: 0.92rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform var(--transition), opacity var(--transition);
      white-space: nowrap;
    }

    #search-btn:hover {
      transform: scale(1.03);
    }

    #search-btn:active {
      transform: scale(0.97);
    }

    #search-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
    }

    .hint {
      margin-top: 20px;
      font-size: 0.82rem;
      color: var(--text-muted);
    }

    .hint span {
      display: inline-block;
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      padding: 4px 12px;
      border-radius: 20px;
      margin: 4px 3px;
      cursor: pointer;
      transition: border-color var(--transition), color var(--transition);
    }

    .hint span:hover {
      border-color: var(--accent);
      color: var(--text-primary);
    }

    /* ── Loading view ────────────────────────────────────── */
    #loading-view {
      flex: 1;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      animation: fadeIn 0.4s ease;
    }

    .spinner {
      width: 48px;
      height: 48px;
      border: 3px solid var(--border-subtle);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 20px;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    #loading-view p {
      color: var(--text-muted);
      font-size: 0.95rem;
    }

    /* ── Result view ─────────────────────────────────────── */
    #result-view {
      flex: 1;
      display: none;
      flex-direction: column;
      animation: fadeIn 0.4s ease;
      overflow: hidden;
    }

    .result-header {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 14px 28px 14px 64px;
      border-bottom: 1px solid var(--border-subtle);
      background: var(--bg-surface);
      flex-shrink: 0;
      position: relative;
    }

    .result-header .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 700;
      font-size: 1rem;
    }

    .result-header .brand-dot {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: var(--gradient);
      display: grid;
      place-items: center;
      font-size: 16px;
    }

    #new-search-btn {
      position: absolute;
      right: 28px;
      padding: 10px 22px;
      border: 1px solid var(--border-subtle);
      border-radius: 10px;
      background: var(--bg-card);
      color: var(--text-primary);
      font-family: inherit;
      font-size: 0.88rem;
      font-weight: 500;
      cursor: pointer;
      transition: border-color var(--transition), background var(--transition);
    }

    #new-search-btn:hover {
      border-color: var(--accent);
      background: rgba(108, 92, 231, 0.08);
    }

    /* ── Two-column content ──────────────────────────────── */
    .result-layout {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    .result-main {
      flex: 1;
      overflow-y: auto;
      padding: 32px 36px 60px;
      min-width: 0;
    }

    .result-main::-webkit-scrollbar {
      width: 6px;
    }

    .result-main::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.08);
      border-radius: 3px;
    }

    .result-sidebar {
      width: 320px;
      flex-shrink: 0;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 24px 20px 60px;
      border-left: 1px solid var(--border-subtle);
      background: var(--bg-surface);
      min-width: 0;
    }

    .result-sidebar::-webkit-scrollbar {
      width: 5px;
    }

    .result-sidebar::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.06);
      border-radius: 3px;
    }

    /* ── Sidebar section cards ────────────────────────────── */
    .sidebar-section {
      margin-bottom: 24px;
      animation: fadeIn 0.4s ease;
    }

    .sidebar-section-title {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--accent-light);
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border-subtle);
    }

    .resource-link {
      display: block;
      padding: 12px 14px;
      margin-bottom: 8px;
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: 10px;
      color: var(--text-primary);
      text-decoration: none;
      font-size: 0.88rem;
      line-height: 1.5;
      transition: border-color var(--transition), transform var(--transition);
      overflow: hidden;
      min-width: 0;
    }

    .resource-link:hover {
      border-color: var(--accent);
      transform: translateX(2px);
    }

    .resource-link .link-title {
      font-weight: 600;
      color: var(--accent-light);
      margin-bottom: 3px;
      word-wrap: break-word;
      overflow-wrap: break-word;
    }

    .resource-link .link-desc {
      font-size: 0.82rem;
      color: var(--text-muted);
      line-height: 1.4;
      word-wrap: break-word;
      overflow-wrap: break-word;
    }

    .resource-link .link-url {
      font-size: 0.72rem;
      color: rgba(167, 139, 250, 0.4);
      margin-top: 4px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ── Error ────────────────────────────────────────────── */
    .error-msg {
      background: rgba(255, 107, 107, 0.08);
      border: 1px solid rgba(255, 107, 107, 0.2);
      border-radius: 12px;
      padding: 20px 24px;
      color: #ff6b6b;
      font-size: 0.92rem;
      line-height: 1.6;
    }

    /* ── Markdown content styles ──────────────────────────── */
    .md-content h1,
    .md-content h2,
    .md-content h3,
    .md-content h4 {
      color: #f0f0f5;
      line-height: 1.3;
      font-weight: 700;
    }

    .md-content h1 {
      font-size: 1.5rem;
      margin: 28px 0 14px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border-subtle);
    }

    .md-content h2 {
      font-size: 1.25rem;
      margin: 26px 0 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border-subtle);
    }

    .md-content h3 {
      font-size: 1.1rem;
      margin: 20px 0 10px;
    }

    .md-content h4 {
      font-size: 1rem;
      color: #b8b8cc;
      margin: 16px 0 8px;
    }

    .md-content h1:first-child,
    .md-content h2:first-child {
      margin-top: 0;
    }

    .md-content p {
      margin: 12px 0;
      line-height: 1.75;
    }

    .md-content p:first-child {
      margin-top: 0;
    }

    .md-content strong {
      color: #fff;
      font-weight: 600;
    }

    .md-content em {
      color: #c0b8f0;
    }

    .md-content ul,
    .md-content ol {
      margin: 12px 0;
      padding-left: 26px;
    }

    .md-content li {
      margin: 8px 0;
      line-height: 1.75;
    }

    .md-content li::marker {
      color: var(--accent);
    }

    .md-content li>ul,
    .md-content li>ol {
      margin: 4px 0;
    }

    .md-content code {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.84em;
      background: rgba(108, 92, 231, 0.12);
      color: #d4bfff;
      padding: 2px 7px;
      border-radius: 5px;
    }

    .md-content pre {
      background: #111118;
      border: 1px solid var(--border-subtle);
      border-radius: 12px;
      padding: 16px 20px;
      margin: 16px 0;
      overflow-x: auto;
    }

    .md-content pre code {
      background: none;
      padding: 0;
      color: #c8c8d8;
      font-size: 0.84em;
      line-height: 1.7;
    }

    .md-content blockquote {
      border-left: 3px solid var(--accent);
      margin: 16px 0;
      padding: 8px 18px;
      color: var(--text-muted);
      background: rgba(108, 92, 231, 0.05);
      border-radius: 0 10px 10px 0;
    }

    .md-content hr {
      border: none;
      border-top: 1px solid rgba(255, 255, 255, 0.06);
      margin: 24px 0;
    }

    .md-content a {
      color: var(--accent-light);
      text-decoration: underline;
      text-decoration-color: rgba(167, 139, 250, 0.3);
      transition: text-decoration-color 0.2s;
    }

    .md-content a:hover {
      text-decoration-color: rgba(167, 139, 250, 0.8);
    }

    /* ── Animations ──────────────────────────────────────── */
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(12px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ── History toggle button ────────────────────────────── */
    .sidebar-toggle {
      position: fixed;
      top: 16px;
      left: 16px;
      width: 40px;
      height: 40px;
      border: 1px solid var(--border-subtle);
      border-radius: 10px;
      background: var(--bg-card);
      color: var(--text-primary);
      font-size: 17px;
      cursor: pointer;
      z-index: 100;
      display: grid;
      place-items: center;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.3);
      transition: background var(--transition), border-color var(--transition);
    }

    .sidebar-toggle:hover {
      border-color: var(--accent);
      background: rgba(108, 92, 231, 0.1);
    }

    /* ── Responsive ──────────────────────────────────────── */
    @media (max-width: 1100px) {
      .result-sidebar {
        width: 280px;
      }
    }

    @media (max-width: 900px) {
      .result-layout {
        flex-direction: column;
      }

      .result-sidebar {
        width: 100%;
        border-left: none;
        border-top: 1px solid var(--border-subtle);
        padding: 20px 20px 48px;
      }

      .result-main {
        padding: 24px 20px 24px;
      }
    }

    @media (max-width: 768px) {
      .sidebar-toggle {
        top: 12px;
        left: 12px;
      }
    }

    @media (max-width: 600px) {
      #search-view h1 {
        font-size: 1.5rem;
      }

      #search-view>p {
        font-size: 0.9rem;
      }

      .search-box {
        flex-direction: column;
        padding: 12px;
      }

      #search-btn {
        padding: 14px;
        border-radius: 10px;
      }

      .result-header {
        padding: 12px 16px;
      }
    }
  </style>
</head>

<body>
  <div class="app">

    <!-- ── Left Sidebar: Search History ─────────────────── -->
    <div class="history-sidebar" id="history-sidebar">
      <div class="history-header">
        <h2>History</h2>
        <button class="clear-all-btn" id="clear-all-btn" onclick="clearAllHistory()">Clear all</button>
      </div>
      <div class="history-list" id="history-list">
        <div class="history-empty" id="history-empty">
          Your searched topics will appear here.
        </div>
      </div>
    </div>

    <!-- ── Backdrop overlay for sidebar ─────────────────── -->
    <div class="sidebar-backdrop" id="sidebar-backdrop" onclick="toggleHistorySidebar()"></div>

    <!-- ── History toggle button (always visible) ──────── -->
    <button class="sidebar-toggle" id="sidebar-toggle" onclick="toggleHistorySidebar()">☰</button>

    <!-- ── Main Area ───────────────────────────────────── -->
    <div class="main-area">

      <!-- Search View -->
      <div id="search-view">
        <div class="brand-icon">✦</div>
        <h1>CS Topic Explorer</h1>
        <p>Type any computer science topic and get a structured explanation with key concepts, resources, and video
          links.</p>
        <div class="search-box">
          <input id="topic-input" type="text" placeholder="e.g. Virtualization, REST APIs, Binary Trees..."
            autocomplete="off" />
          <button id="search-btn">Explore</button>
        </div>
        <div class="hint">
          Try: <span onclick="quickSearch(this)">Cloud Computing</span>
          <span onclick="quickSearch(this)">Docker</span>
          <span onclick="quickSearch(this)">TCP/IP</span>
          <span onclick="quickSearch(this)">Machine Learning</span>
        </div>
      </div>

      <!-- Loading View -->
      <div id="loading-view">
        <div class="spinner"></div>
        <p>Researching your topic...</p>
      </div>

      <!-- Result View -->
      <div id="result-view">
        <div class="result-header">
          <div class="brand">
            <div class="brand-dot">✦</div>
            CS Topic Explorer
          </div>
          <button id="new-search-btn" onclick="newSearch()">✦ New Search</button>
        </div>
        <div class="result-layout">
          <div class="result-main">
            <div id="main-content" class="md-content"></div>
          </div>
          <div class="result-sidebar" id="sidebar-content"></div>
        </div>
      </div>

    </div>
  </div>

  <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>

</html>
